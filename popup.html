<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    .stats {
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: #ffd700;
      border: 1px solid #e0a800;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #f0d000;
    }
    button.danger {
      background: #ff4444;
      border-color: #cc0000;
      color: white;
    }
    button.danger:hover {
      background: #ff6666;
    }
    .note {
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>✨ 文本高亮工具</h3>
  
  <div class="stats" id="stats">
    加载中...
  </div>
  
  <button id="clearCurrent">清除当前页面高亮</button>
  <button id="clearAll" class="danger">清除所有页面高亮</button>
  
  <div class="note">
    选中文本后点击✨按钮或右键选择“高亮选中文本”
  </div>

  <script src="popup.js"></script>
</body>
</html>
